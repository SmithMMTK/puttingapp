<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Putting Simulator</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
<div class="app">

  <header>
    <div class="header-left">
      <h1>🏌️ Putting Simulator</h1>
      <span id="game-score-badge" class="game-score-badge" style="display:none">⛳ <span id="game-pts">0/100 · Hole 1/20 · worth 1pt</span></span>
    </div>
    <div class="mode-toggle">
      <button id="btn-mode-practice" class="mode-btn active">Practice</button>
      <button id="btn-mode-game"     class="mode-btn">🎯 Game</button>
    </div>
  </header>

  <main>

    <!-- Green canvas -->
    <div class="canvas-wrap">
      <canvas id="green-canvas"></canvas>
      <!-- Game-over overlay (shown after all 100 putts) -->
      <div id="game-over-overlay" class="game-over-overlay" style="display:none">
        <div class="game-over-card">
          <div class="game-over-title">🏆 Game Complete!</div>
          <div id="game-over-score" class="game-over-score">0 / 100 pts</div>
          <div id="game-over-rating" class="game-over-rating"></div>
        </div>
      </div>
    </div>

    <!-- Aim readout / Result legend — same slot, swap on result -->
    <div id="aim-display" class="aim-display">Aim: At hole</div>
    <div id="result-legend" class="result-legend" style="display:none">
      <span class="leg-user">⬤ Your aim</span>
      <span class="leg-correct">⬤ Optimal aim</span>
    </div>

    <!-- Controls -->
    <section class="controls">

      <!-- Break direction -->
      <div class="control-row full-width">
        <span class="ctrl-label">Break</span>
        <div class="break-btns">
          <button id="btn-left"     class="break-btn">◀ Left</button>
          <button id="btn-right"    class="break-btn active">Right ▶</button>
        </div>
      </div>

      <!-- Break magnitude -->
      <div class="control-row">
        <label for="break-mag" class="ctrl-label">
          Slope <span id="break-val" class="val">2.0%</span>
        </label>
        <input type="range" id="break-mag" min="1" max="4" step="0.5" value="2" />
      </div>

      <!-- Distance -->
      <div class="control-row">
        <label for="distance" class="ctrl-label">
          Distance <span id="distance-val" class="val">12 ft</span>
        </label>
        <input type="range" id="distance" min="1" max="30" step="1" value="12" />
      </div>

      <!-- Green speed -->
      <div class="control-row">
        <label for="stimp" class="ctrl-label">
          Stimp <span id="stimp-val" class="val">8.0</span>
        </label>
        <input type="range" id="stimp" min="8" max="12" step="0.5" value="9" />
      </div>

      <!-- Putt firmness: how far past hole -->
      <div class="control-row">
        <label for="past-feet" class="ctrl-label">
          Firmness <span id="past-val" class="val">1.5 ft</span>
        </label>
        <input type="range" id="past-feet" min="1" max="3" step="0.5" value="1.5" />
      </div>

    </section>

    <!-- Action buttons -->
    <div class="btn-area">
      <button id="btn-random" class="btn-random">🎲 Random</button>
      <button id="btn-putt"   class="btn-putt">Putt</button>
      <button id="btn-retry"  class="btn-retry"  style="display:none">↺ Try Again</button>
      <button id="btn-next"   class="btn-next"   style="display:none">Next Putt →</button>
    </div>

  </main>

  <footer>
    <p class="disclaimer">
      Assumes uniform slope throughout. Does not model grain, undulation, or compound break.
      Use as a guide, not a precise forecast.
    </p>
  </footer>

</div>
<script type="module">
  import { initUI } from './ui.js';
  initUI();
</script>
</body>
</html>
